[tool.ruff]
line-length = 100
target-version = "py311"
exclude = [
    ".venv",
    "migrations",
    "staticfiles",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # bugbear
    "C4",  # comprehensions
    "UP",  # pyupgrade
    "N",   # naming
]
ignore = [
    "E501",  # line too long (black handles)
]

[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
  \.venv
  | migrations
  | staticfiles
)/
'''

[tool.isort]
profile = "black"
line_length = 100
skip = [".venv", "migrations"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "chronotrace.settings"
python_files = ["test_*.py", "*_test.py", "tests.py"]
addopts = "-ra --strict-markers"
